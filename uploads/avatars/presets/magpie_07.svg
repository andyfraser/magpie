<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <!-- Winking -->
  <circle cx="60" cy="60" r="60" fill="#fff0f6"/>
  <ellipse cx="27" cy="93" rx="8" ry="22" fill="#1a1a2e" transform="rotate(-22 27 93)"/>
  <ellipse cx="57" cy="86" rx="27" ry="21" fill="#1a1a2e"/>
  <ellipse cx="59" cy="89" rx="16" ry="13" fill="#e8edf3"/>
  <ellipse cx="45" cy="76" rx="12" ry="7" fill="#e8edf3" transform="rotate(-15 45 76)"/>
  <circle cx="67" cy="48" r="22" fill="#1a1a2e"/>
  <!-- Eye (open, big) -->
  <circle cx="75" cy="41" r="7.5" fill="white"/>
  <circle cx="77" cy="43" r="4.5" fill="#1a1a2e"/>
  <circle cx="79" cy="40" r="1.8" fill="white"/>
  <!-- Wink line (closed eye over the eye white) -->
  <path d="M67.5,41 Q75,46 82.5,41" stroke="#1a1a2e" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- Blush mark under wink -->
  <ellipse cx="80" cy="51" rx="5" ry="3" fill="#fca5a5" opacity="0.75"/>
  <polygon points="89,46 102,50 89,54" fill="#f59e0b"/>
</svg>
